<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HostPanel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── VARIABLEN (v1 Cyan-Theme) ────────────────────────────────── */
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#111827;--card:#141c2e;--card2:#1a2540;
  --border:#1e2d4a;--border2:#243459;
  --accent:#00d4ff;--accent2:#0099cc;--accent3:#00f5a0;
  --danger:#ff3b5c;--warn:#f59e0b;--success:#00f5a0;
  --text:#e8edf5;--text2:#8fa3c8;--text3:#4d6490;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ─── AUTH ──────────────────────────────────────────────────────── */
#auth-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.06) 0,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(0,245,160,.04) 0,transparent 40%);
}
.auth-box{width:420px;background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:40px;box-shadow:0 0 60px rgba(0,212,255,.07),0 24px 48px rgba(0,0,0,.4)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo .icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.auth-logo h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.auth-logo span{display:block;font-size:11px;color:var(--text2);font-family:var(--mono)}
.auth-tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--bg2);border-radius:8px;padding:4px}
.auth-tab{flex:1;padding:8px;text-align:center;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:6px;font-size:13px;font-family:var(--font);transition:.2s}
.auth-tab.active{background:var(--card2);color:var(--text);font-weight:600}

/* ─── FORMS ─────────────────────────────────────────────────────── */
.form-group{margin-bottom:18px}
.form-label{display:block;margin-bottom:6px;color:var(--text2);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;transition:.2s;outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg2)}
textarea.form-input{resize:vertical}

/* ─── BUTTONS ───────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:.15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--accent3),#00cc88);color:#000}
.btn-danger{background:linear-gradient(135deg,var(--danger),#cc2244);color:#fff}
.btn-warn{background:linear-gradient(135deg,var(--warn),#cc8800);color:#000}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--card2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}
.btn-block{width:100%;justify-content:center}
.error-msg{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);color:#ff8099;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.success-msg{background:rgba(0,245,160,.1);border:1px solid rgba(0,245,160,.3);color:var(--accent3);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.info-msg{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--accent);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.warn-msg{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}

/* ─── MAIN LAYOUT ───────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-brand{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:8px}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.brand-ver{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sidebar-section{padding:6px 10px 4px;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:1px 6px;border-radius:8px;cursor:pointer;color:var(--text2);transition:.15s;font-size:13px;font-weight:500;user-select:none}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.15)}
.nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-card{background:var(--card);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.user-card:hover{background:var(--card2)}
.user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.user-info{min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text3)}

/* ─── MAIN CONTENT ──────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:24px}

/* ─── CARDS ─────────────────────────────────────────────────────── */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600}

/* ─── STAT CARDS ─────────────────────────────────────────────────── */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;opacity:.05;background:linear-gradient(135deg,var(--accent),transparent)}
.stat-icon{font-size:28px;margin-bottom:12px}
.stat-value{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.stat-sub{font-size:11px;color:var(--accent3);margin-top:4px;font-family:var(--mono)}

/* ─── NODE CARDS (v2 NEU) ──────────────────────────────────────── */
.node-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:.15s;position:relative;overflow:hidden}
.node-card.online{border-color:rgba(0,245,160,.25)}
.node-card.online::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent3),var(--accent))}
.node-card.offline{opacity:.75}
.node-card.local{border-color:rgba(0,212,255,.2)}
.node-card.local::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.node-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.node-name{font-size:15px;font-weight:700}
.node-fqdn{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.node-stats-row{display:flex;gap:10px;margin-top:10px}
.node-stat{flex:1;text-align:center;padding:8px;background:var(--bg2);border-radius:8px}
.node-stat-val{font-size:15px;font-weight:700;font-family:var(--mono)}
.node-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.node-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.node-indicator{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(0,212,255,.08);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.node-indicator .ndot{width:7px;height:7px;border-radius:50%}
.ndot-on{background:var(--success);box-shadow:0 0 6px var(--success)}
.ndot-off{background:var(--text3)}
.ndot-local{background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* ─── SERVER LIST ───────────────────────────────────────────────── */
.server-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:.15s}
.server-item:hover{border-color:var(--border2);background:var(--card2)}
.server-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.server-status-dot.running{background:var(--success);box-shadow:0 0 8px var(--success)}
.server-status-dot.offline{background:var(--text3)}
.server-status-dot.error{background:var(--danger);box-shadow:0 0 8px var(--danger)}
.server-status-dot.installing,.server-status-dot.starting,.server-status-dot.stopping,.server-status-dot.restarting{background:var(--warn);box-shadow:0 0 8px var(--warn);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.server-info{flex:1;min-width:0}
.server-name{font-size:14px;font-weight:600}
.server-meta{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono)}
.server-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--border)}
.tag-image{color:var(--accent);border-color:rgba(0,212,255,.2);background:rgba(0,212,255,.05)}
.tag-status{border-color:rgba(0,245,160,.2);background:rgba(0,245,160,.05);color:var(--accent3)}
.tag-status.offline{color:var(--text3);border-color:var(--border)}
.tag-status.error{color:var(--danger);border-color:rgba(255,59,92,.2);background:rgba(255,59,92,.05)}
.tag-node{color:var(--warn);border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.05)}
.server-resources{text-align:right;font-size:11px;color:var(--text2);font-family:var(--mono);flex-shrink:0;line-height:1.8}
.server-actions{display:flex;gap:6px;flex-shrink:0}

/* ─── SERVER DETAIL ─────────────────────────────────────────────── */
.server-detail-grid{display:grid;grid-template-columns:1fr 340px;gap:16px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ─── CONSOLE ───────────────────────────────────────────────────── */
.console-wrap{background:#050810;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;height:420px}
.console-header{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.console-dot{width:10px;height:10px;border-radius:50%}
.console-output{flex:1;overflow-y:auto;padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.6;color:#a8c0e0}
.console-output .line{white-space:pre-wrap;word-break:break-all}
.console-output .line.error{color:#ff6b8a}
.console-output .line.warn{color:var(--warn)}
.console-output .line.ok{color:var(--success)}
.console-output .line.sys{color:var(--accent);font-style:italic}
.console-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.console-input{flex:1;background:transparent;border:none;color:var(--accent3);font-family:var(--mono);font-size:12px;outline:none}
.console-input::placeholder{color:var(--text3)}
.console-prompt{color:var(--text3);font-family:var(--mono);font-size:12px;line-height:1.6;flex-shrink:0;padding-top:2px}

/* ─── RESOURCE BARS ─────────────────────────────────────────────── */
.resource-bar{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;flex:1}
.resource-fill{height:100%;border-radius:4px;transition:.5s}
.resource-fill.cpu{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.resource-fill.memory{background:linear-gradient(90deg,var(--accent3),#00aa77)}
.resource-fill.danger{background:linear-gradient(90deg,var(--danger),#cc2244)}
.resource-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.resource-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0}
.resource-val{font-size:12px;font-family:var(--mono);color:var(--text);width:90px;text-align:right;flex-shrink:0}

/* ─── TABLE ─────────────────────────────────────────────────────── */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:10px 12px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.table td{padding:10px 12px;border-bottom:1px solid rgba(30,45,74,.5);font-size:13px;vertical-align:middle}
.table tr:hover td{background:rgba(255,255,255,.02)}
.table tr:last-child td{border-bottom:none}

/* ─── MODAL ─────────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 64px rgba(0,0,0,.5)}
.modal-lg{max-width:680px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:0;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-footer{margin-top:24px;display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid var(--border)}

/* ─── TOKEN/SETUP BOXEN (v2 NEU) ──────────────────────────────── */
.setup-box{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:18px;margin-top:16px}
.setup-box h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:10px}
.token-box{background:#050810;border:1px solid rgba(255,59,92,.25);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:12px;color:#ff8099;word-break:break-all;line-height:1.6}
.code-box{background:#050810;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:12px;color:var(--accent);word-break:break-all;line-height:1.8;margin-top:8px}
.env-display{background:#050810;border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;line-height:2;color:#a8c0e0}
.env-key{color:var(--warn)}
.env-val{color:var(--accent3)}

/* ─── TOAST ─────────────────────────────────────────────────────── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;animation:slideIn .25s ease;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;min-width:280px;max-width:380px}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--accent)}
.toast.warn{border-left:3px solid var(--warn)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}

/* ─── MISC ───────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty h3{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty p{font-size:13px}
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
.flex-1{flex:1}.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-mono{font-family:var(--mono)}.text-muted{color:var(--text2)}.text-dim{color:var(--text3)}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-accent{color:var(--accent)}.text-warn{color:var(--warn)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-online{background:rgba(0,245,160,.1);color:var(--success);border:1px solid rgba(0,245,160,.2)}
.chip-offline{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border)}
.chip-admin{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.chip-local{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.power-btn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s}
.power-btn:hover{background:var(--card2);border-color:var(--border2)}
.power-btn.start:hover{border-color:rgba(0,245,160,.4);background:rgba(0,245,160,.1);color:var(--success)}
.power-btn.stop:hover{border-color:rgba(255,59,92,.4);background:rgba(255,59,92,.1);color:var(--danger)}
.power-btn.restart:hover{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1);color:var(--warn)}

/* ─── FILE MANAGER ──────────────────────────────────────────────── */
.fm-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fm-path{flex:1;font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.fm-table{width:100%;border-collapse:collapse}
.fm-table th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);user-select:none}
.fm-table td{padding:8px 10px;border-bottom:1px solid rgba(30,45,74,.4);font-size:12px;vertical-align:middle}

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const State = {
  token:       localStorage.getItem('hp_token') || null,
  user:        null,
  currentPage: 'dashboard',
  serverDetail: null,
  wsConn:      null,
  nodes:       {},   // nodeId → node-info
};

// ─── API ─────────────────────────────────────────────────────────────────────
const API = {
  async req(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (State.token) opts.headers['Authorization'] = `Bearer ${State.token}`;
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res  = await fetch('/api' + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  },
  get:    p     => API.req('GET', p),
  post:   (p,b) => API.req('POST', p, b),
  put:    (p,b) => API.req('PUT', p, b),
  patch:  (p,b) => API.req('PATCH', p, b),
  delete: (p,b) => API.req('DELETE', p, b),
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').classList.add('hidden');
}
async function doLogin() {
  try {
    const d = await API.post('/auth/login', { email: document.getElementById('login-email').value.trim(), password: document.getElementById('login-pass').value });
    State.token = d.token; localStorage.setItem('hp_token', d.token); State.user = d.user; initApp();
  } catch (e) { showAuthError(e.message); }
}
async function doRegister() {
  try {
    const d = await API.post('/auth/register', { username: document.getElementById('reg-user').value.trim(), email: document.getElementById('reg-email').value.trim(), password: document.getElementById('reg-pass').value });
    State.token = d.token; localStorage.setItem('hp_token', d.token); State.user = d.user; initApp();
  } catch (e) { showAuthError(e.message); }
}
function showAuthError(m) { const el = document.getElementById('auth-error'); el.textContent = m; el.classList.remove('hidden'); }
function logout() {
  State.token = null; localStorage.removeItem('hp_token'); State.user = null;
  if (State.wsConn) State.wsConn.close();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initApp() {
  try {
    if (!State.user) State.user = await API.get('/auth/me');
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('sidebar-name').textContent = State.user.username;
    document.getElementById('sidebar-role').textContent = State.user.role;
    document.getElementById('sidebar-avatar').textContent = State.user.username[0].toUpperCase();
    if (State.user.role === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
    connectWS();
    navigate('dashboard');
    loadServerCount();
  } catch { logout(); }
}
async function loadServerCount() {

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
let _wsDelay = 2000;
let _wsTimer = null;

function connectWS() {
  // Verhindere doppelte Verbindungen
  if (State.wsConn && State.wsConn.readyState === WebSocket.CONNECTING) return;
  if (State.wsConn && State.wsConn.readyState === WebSocket.OPEN) return;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let ws;
  try {
    ws = new WebSocket(`${proto}//${location.host}/ws`);
  } catch { return; }

  State.wsConn = ws;

  ws.onopen = () => {
    _wsDelay = 2000; // Reset backoff bei Erfolg
    ws.send(JSON.stringify({ type: 'auth', token: State.token }));
    // Aktiven Server neu abonnieren
    if (State.serverDetail) {
      wsSend({ type: 'subscribe_stats',   server_id: State.serverDetail });
      wsSend({ type: 'console.subscribe', server_id: State.serverDetail });
    }
  };

  ws.onmessage = e => { try { handleWsMsg(JSON.parse(e.data)); } catch {} };

  ws.onerror = () => { /* Error wird durch onclose abgehandelt, kein Log */ };

  ws.onclose = () => {
    State.wsConn = null;
    // Exponential backoff: 2s → 4s → 8s → max 30s
    _wsDelay = Math.min(_wsDelay * 1.5, 30000);
    if (_wsTimer) clearTimeout(_wsTimer);
    _wsTimer = setTimeout(connectWS, _wsDelay);
  };
}

function toggleAlloc(el, port) {
  const portsEl = document.getElementById('m-ports');
  if (!portsEl) return;
  const entry = `${port}:${port}`;
  const selected = el.dataset.selected === '1';
  if (selected) {
    el.style.background = 'var(--card2)';
    el.style.color = 'var(--success)';
    el.dataset.selected = '0';
    portsEl.value = portsEl.value.split(',').map(s=>s.trim()).filter(s=>s && s!==entry).join(', ');
  } else {
    el.style.background = '#7c6af7';
    el.style.color = '#fff';
    el.dataset.selected = '1';
    const parts = portsEl.value.split(',').map(s=>s.trim()).filter(Boolean);
    if (!parts.includes(entry)) parts.push(entry);
    portsEl.value = parts.join(', ');
  }
}

function wsSend(m) { if (State.wsConn?.readyState === WebSocket.OPEN) State.wsConn.send(JSON.stringify(m)); }

// ─── STATUS POLLING ──────────────────────────────────────────────────────────
// Wenn Server in transitionalem Zustand (starting/stopping/installing) → alle 3s Status prüfen
let _statusPollTimer = null;
const TRANSITIONAL = new Set(['starting','stopping','restarting','installing']);

function startStatusPoll(serverId) {
  stopStatusPoll();
  _statusPollTimer = setInterval(async () => {
    try {
      const srv = await API.get(`/servers/${serverId}`);
      // Status-Dot überall aktualisieren
      document.querySelectorAll(`[data-sid="${serverId}"]`).forEach(el => {
        el.className = `server-status-dot ${srv.status}`;
      });
      if (State.currentPage === 'server-detail' && State.serverDetail === serverId) {
        // Topbar-Buttons neu rendern wenn Status sich geändert hat
        const sc = srv.status;
        document.getElementById('page-actions').innerHTML = `
          <button class="btn btn-ghost btn-sm" onclick="navigate('servers')">← Zurück</button>
          ${sc !== 'running' ? `<button class="btn btn-success btn-sm" onclick="serverPower('${serverId}','start')">▶ Start</button>` : ''}
          ${sc === 'running' ? `<button class="btn btn-ghost btn-sm" onclick="serverPower('${serverId}','restart')">↺ Restart</button>` : ''}
          ${sc === 'running' ? `<button class="btn btn-danger btn-sm" onclick="serverPower('${serverId}','stop')">■ Stop</button>` : ''}
          <button class="btn btn-ghost btn-sm" onclick="showEditServer('${serverId}')">✏️ Bearbeiten</button>
          <button class="btn btn-ghost btn-sm text-danger" onclick="confirmDeleteServer('${serverId}','${esc(srv.name)}')">🗑️</button>`;
        // Konsole-Header-Dot
        const dot = document.querySelector('.console-dot');
        if (dot) dot.style.background = sc === 'running' ? 'var(--success)' : 'var(--text3)';
      }
      // Polling stoppen wenn stabiler Status erreicht
      if (!TRANSITIONAL.has(srv.status)) stopStatusPoll();
    } catch {}
  }, 3000);
}

function stopStatusPoll() {
  if (_statusPollTimer) { clearInterval(_statusPollTimer); _statusPollTimer = null; }
}

function handleWsMsg(msg) {
  if (msg.type === 'auth') return;
  if (msg.type === 'stats')          { handleWsStats(msg); return; }
  if (msg.type === 'console')        { handleWsConsole(msg); return; }
  // v2: Node-Events
  if (msg.type === 'nodes.status')   { msg.nodes.forEach(n => { State.nodes[n.id] = n; }); updateNodeIndicators(); return; }
  if (msg.type === 'node.online')    { if (State.nodes[msg.node_id]) State.nodes[msg.node_id].connected = true; updateNodeIndicators(); toast(`Node "${msg.node_name}" verbunden ✅`, 'success'); return; }
  if (msg.type === 'node.offline')   { if (State.nodes[msg.node_id]) State.nodes[msg.node_id].connected = false; updateNodeIndicators(); toast(`Node "${msg.node_name}" getrennt`, 'warn'); return; }
  if (msg.type === 'node.info' && State.nodes[msg.node_id]) { State.nodes[msg.node_id].system = msg.system; return; }
  if (msg.type === 'server.status')  {
    document.querySelectorAll(`[data-sid="${msg.server_id}"]`).forEach(el => el.className = `server-status-dot ${msg.status}`);
  }
}

function updateNodeIndicators() {
  document.querySelectorAll('[data-node-ind]').forEach(el => {
    const n = State.nodes[el.dataset.nodeInd];
    if (!n) return;
    const dot = el.querySelector('.ndot');
    if (dot) dot.className = `ndot ${n.connected ? (n.is_local ? 'ndot-local' : 'ndot-on') : 'ndot-off'}`;
    const lbl = el.querySelector('.ni-lbl');
    if (lbl) lbl.textContent = n.connected ? (n.is_local ? 'lokal' : 'online') : 'offline';
  });
}

async function serverPower(id, action) {
  try {
    await API.post(`/servers/${id}/power/${action}`, {});
    const actionLabels = { start:'▶ Start', stop:'■ Stop', restart:'↺ Neustart', kill:'⚡ Kill' };
    toast(`${actionLabels[action]||action} Signal gesendet`, 'success');
    startStatusPoll(id); // Polling starten bis Status stabil
    if (State.currentPage === 'servers') loadServers();
    if (State.currentPage === 'server-detail') loadServerDetail(id);
  } catch (e) {
    const msg = e.message || '';
    if (msg.includes('noch nicht fertig') || msg.includes('installiert')) {
      toast('⏳ Server wird noch installiert — bitte warten', 'warn');
    } else if (msg.includes('offline') || msg.includes('Node')) {
      toast('⚠️ Node ist offline', 'warn');
    } else {
      toast(msg, 'error');
    }
  }
}

function detailTab(tab, btn) {
  document.querySelectorAll('#detail-tabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

    State.fmPath = _itzg ? '/data' : '/home/container';

  }

}

async function reloadLogs(id) {
  try {
    const d = await API.get(`/servers/${id}/logs`);
    const out = document.getElementById('console-output');
    if (!out) return;
    out.innerHTML = '';
    (d.logs||'').split('\n').filter(Boolean).forEach(line => appendConsoleLine(line));
    out.scrollTop = out.scrollHeight;
  } catch {}
}

function appendConsoleLine(text) {
  const out = document.getElementById('console-output');
  if (!out) return;
  text.split('\n').filter(Boolean).forEach(line => {
    const el = document.createElement('div');
    const lower = line.toLowerCase();
    el.className = 'line' + (lower.includes('error')||lower.includes('fatal')?' error':lower.includes('warn')?' warn':lower.includes('[system]')?' sys':lower.includes('start')||lower.includes('ready')||lower.includes('listen')?' ok':'');
    el.textContent = line;
    out.appendChild(el);
  });
  out.scrollTop = out.scrollHeight;
  while (out.children.length > 600) out.removeChild(out.firstChild);
}
function clearConsole() { const el = document.getElementById('console-output'); if (el) el.innerHTML = ''; }

async function sendConsoleCommand(id) {
  const input = document.getElementById('console-input');
  const cmd = input.value.trim(); if (!cmd) return;
  input.value = '';
  // Try WebSocket first (real-time), fall back to REST
  if (State.wsConn && State.wsConn.readyState === WebSocket.OPEN) {
    wsSend({ type: 'console.input', server_id: id, command: cmd });
  } else {
    appendConsoleLine(`\x1b[33m> ${cmd}\x1b[0m`);
    try { const d = await API.post(`/servers/${id}/command`, { command: cmd }); if (d.output) appendConsoleLine(d.output); }
    catch (e) { appendConsoleLine(`Fehler: ${e.message}`); }
  }
}

// ─── CHARTS ─────────────────────────────────────────────────────────────────
let cpuChart = null, memChart = null, netChart = null;
const chartHistory = { cpu: [], mem: [], rxPrev: 0, txPrev: 0, netRx: [], netTx: [], labels: [] };
const MAX_POINTS = 60;

function initCharts() {
  if (!window.Chart) return;
  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 0 },
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: { min: 0, grid: { color: 'rgba(30,45,74,.5)' }, ticks: { color: '#8fa3c8', font: { family: 'JetBrains Mono', size: 10 } } }
    },
  };
  // CPU Chart
  const cpuCtx = document.getElementById('cpu-chart')?.getContext('2d');
  if (cpuCtx) {
    if (cpuChart) cpuChart.destroy();
    cpuChart = new Chart(cpuCtx, {
      type: 'line',
      data: { labels: chartHistory.labels, datasets: [{ data: chartHistory.cpu, borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,.1)', borderWidth: 2, fill: true, tension: .3, pointRadius: 0 }] },
      options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, max: 100, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '%' } } } }
    });
  }
  // Mem Chart
  const memCtx = document.getElementById('mem-chart')?.getContext('2d');
  if (memCtx) {
    if (memChart) memChart.destroy();
    memChart = new Chart(memCtx, {
      type: 'line',
      data: { labels: chartHistory.labels, datasets: [{ data: chartHistory.mem, borderColor: '#00f5a0', backgroundColor: 'rgba(0,245,160,.1)', borderWidth: 2, fill: true, tension: .3, pointRadius: 0 }] },
      options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => fmtBytes(v * 1024 * 1024) } } } }
    });
  }
  // Net Chart
  const netCtx = document.getElementById('net-chart')?.getContext('2d');
  if (netCtx) {
    if (netChart) netChart.destroy();
    netChart = new Chart(netCtx, {
      type: 'line',
      data: { labels: chartHistory.labels, datasets: [
        { label: 'RX', data: chartHistory.netRx, borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,.08)', borderWidth: 2, fill: true, tension: .3, pointRadius: 0 },
        { label: 'TX', data: chartHistory.netTx, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,.08)', borderWidth: 2, fill: true, tension: .3, pointRadius: 0 },
      ] },
      options: { ...chartDefaults, plugins: { legend: { display: true, labels: { color: '#8fa3c8', font: { size: 11 }, usePointStyle: true } } }, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => fmtBytes(v) } } } }
    });
  }
}

function pushChartData(cpu, memMb, netRxDelta, netTxDelta) {
  const now = new Date().toLocaleTimeString('de', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  if (chartHistory.labels.length >= MAX_POINTS) {
    chartHistory.labels.shift(); chartHistory.cpu.shift(); chartHistory.mem.shift();
    chartHistory.netRx.shift(); chartHistory.netTx.shift();
  }
  chartHistory.labels.push(now); chartHistory.cpu.push(Math.round(cpu*10)/10);
  chartHistory.mem.push(Math.round(memMb)); chartHistory.netRx.push(netRxDelta); chartHistory.netTx.push(netTxDelta);
  if (cpuChart) cpuChart.update('none');
  if (memChart) memChart.update('none');
  if (netChart) netChart.update('none');
  // Update current value labels
  const cc = document.getElementById('chart-cpu-cur'); if (cc) cc.textContent = cpu.toFixed(1)+'%';
  const mc = document.getElementById('chart-mem-cur'); if (mc) mc.textContent = fmtBytes(memMb * 1024 * 1024);
  // Update KPI cards
  const scCpu = document.getElementById('sc-cpu'); if (scCpu) scCpu.textContent = cpu.toFixed(1)+'%';
  const scCpuBar = document.getElementById('sc-cpu-bar'); if (scCpuBar) { scCpuBar.style.width=Math.min(cpu,100)+'%'; scCpuBar.className='kpi-fill kpi-cpu'+(cpu>80?' danger':''); }
  const scMem = document.getElementById('sc-mem'); if (scMem) scMem.textContent = fmtBytes(memMb*1024*1024);
  const scMemSub = document.getElementById('sc-mem-limit'); if (scMemSub&&chartHistory._memLimit) scMemSub.textContent = 'von '+fmtBytes(chartHistory._memLimit*1024*1024);
  const scMemBar = document.getElementById('sc-mem-bar'); if (scMemBar) { const p=memMb>0&&chartHistory._memLimit>0?Math.min(100,memMb/chartHistory._memLimit*100):0; scMemBar.style.width=p+'%'; }
}

function handleWsStats(msg) {
  if (msg.server_id !== State.serverDetail) return;
  const d = msg.data;
  // ── Sidebar stats bar ────────────────────────────────────────────────────────
  const cpuEl = document.getElementById('stat-cpu-val'), cpuBar = document.getElementById('stat-cpu-bar');
  const memEl = document.getElementById('stat-mem-val'), memBar = document.getElementById('stat-mem-bar');
  const pidEl = document.getElementById('stat-pid-val'), pidBar = document.getElementById('stat-pid-bar');
  const rxEl = document.getElementById('stat-rx'), txEl = document.getElementById('stat-tx');
  const cpu = Math.min(d.cpu||0, 100);
  if (cpuEl) { cpuEl.textContent = cpu.toFixed(1)+'%'; cpuBar.style.width = cpu+'%'; cpuBar.className = 'resource-fill '+(cpu>80?'danger':'cpu'); }
  const memMb = d.memory_limit > 0 ? d.memory / 1024 / 1024 : 0;
  const memLimitMb = (d.memory_limit || 0) / 1024 / 1024;
  chartHistory._memLimit = memLimitMb || 512;
  if (memEl && d.memory_limit > 0) {
    const pct = (d.memory / d.memory_limit * 100);
    memEl.textContent = fmtBytes(d.memory)+' / '+fmtBytes(d.memory_limit);
    memBar.style.width = Math.min(pct,100)+'%'; memBar.className = 'resource-fill '+(pct>80?'danger':'memory');
  }
  if (pidEl && d.pids !== undefined) { pidEl.textContent = d.pids; pidBar.style.width = Math.min(d.pids/256*100,100)+'%'; }
  if (rxEl) rxEl.textContent = fmtBytes(d.network_rx);
  if (txEl) txEl.textContent = fmtBytes(d.network_tx);
  // ── Stats tab extended ─────────────────────────────────────────────────────
  const s2cpu = document.getElementById('stat2-cpu-val'); if(s2cpu){s2cpu.textContent=cpu.toFixed(1)+'%';document.getElementById('stat2-cpu-bar').style.width=cpu+'%';}
  const s2mem = document.getElementById('stat2-mem-val'); if(s2mem && d.memory_limit>0){s2mem.textContent=fmtBytes(d.memory)+' / '+fmtBytes(d.memory_limit);const p=(d.memory/d.memory_limit*100);document.getElementById('stat2-mem-bar').style.width=Math.min(p,100)+'%';}
  const s2rx = document.getElementById('stat2-rx'); if(s2rx) s2rx.textContent=fmtBytes(d.network_rx);
  const s2tx = document.getElementById('stat2-tx'); if(s2tx) s2tx.textContent=fmtBytes(d.network_tx);
  const s2p = document.getElementById('stat2-pids'); if(s2p) s2p.textContent=d.pids||'0';
  const s2s = document.getElementById('stat2-status'); if(s2s) s2s.textContent=d.status||'running';
  // ── Chart data ─────────────────────────────────────────────────────────────
  const rxDelta = Math.max(0, (d.network_rx||0) - chartHistory.rxPrev);
  const txDelta = Math.max(0, (d.network_tx||0) - chartHistory.txPrev);
  chartHistory.rxPrev = d.network_rx||0; chartHistory.txPrev = d.network_tx||0;
  pushChartData(cpu, memMb, rxDelta, txDelta);
}
function handleWsConsole(msg) { if (msg.server_id === State.serverDetail) appendConsoleLine(msg.data); }

// ─── FILE MANAGER ─────────────────────────────────────────────────────────────
State.fmPath = '/home/container';

async function fmLoad(serverId, path) {
  const el = document.getElementById('fm-content'); if (!el) return;
  const pathEl = document.getElementById('fm-path');
  if (pathEl) {
    const _root = ((State.server?.image||'').includes('itzg') || (State.server?.image||'').includes('minecraft-server')) ? '/data' : '/home/container';
    if (path === _root) {
      pathEl.textContent = '/';
    } else if (path.startsWith(_root + '/')) {
      pathEl.textContent = path.slice(_root.length); // z.B. /plugins statt /data/plugins
    } else {
      pathEl.textContent = path;
    }
  }
  el.innerHTML = '<div class="empty" style="padding:24px"><div class="spin">📁</div></div>';
  try {
    const files = await API.get(`/servers/${serverId}/files/list?path=${encodeURIComponent(path)}`);
    if (!document.getElementById('fm-content')) return; // navigated away
    el.innerHTML = fmRenderTable(files, serverId, path);
  } catch (e) {
    const msg = e.message || '';
    const isNotReady = msg.includes('nicht bereit') || msg.includes('Container') || msg.includes('400');
    el.innerHTML = `<div class="empty" style="padding:32px">
      <div class="empty-icon">${isNotReady ? '⏳' : '❌'}</div>
      <p>${isNotReady ? 'Container ist noch nicht bereit — Server zuerst starten' : esc(msg)}</p>
      ${isNotReady ? '' : `<button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="fmLoad('${serverId}','${path}')">↺ Erneut versuchen</button>`}
    </div>`;
  }
}

function fmRenderTable(files, serverId, path) {
  if (!files.length) return '<div class="empty" style="padding:24px"><div class="empty-icon">📂</div><p>Verzeichnis ist leer</p></div>';
  const sorted = [...files].sort((a,b) => {
    if (a.type==='directory' && b.type!=='directory') return -1;
    if (a.type!=='directory' && b.type==='directory') return 1;
    return a.name.localeCompare(b.name);
  });
  return `<table class="fm-table">
    <thead><tr><th>Name</th><th>Größe</th><th>Geändert</th><th style="width:80px"></th></tr></thead>
    <tbody>
      ${(() => {
    const _srvRoot = ((State.server?.image||'').includes('itzg') || (State.server?.image||'').includes('minecraft-server')) ? '/data' : '/home/container';
    return path !== _srvRoot ? `<tr onclick="fmNavigateUp()" style="cursor:pointer"><td colspan="4"><span class="fm-icon">⬆️</span><span class="fm-name dir">..</span></td></tr>` : '';
  })()}
      ${sorted.map(f => {
        const icon = f.type==='directory'?'📁':f.name.endsWith('.yml')||f.name.endsWith('.yaml')?'⚙️':f.name.endsWith('.json')?'📋':f.name.endsWith('.log')?'📜':f.name.endsWith('.sh')?'⚡':'📄';
        const isDir = f.type==='directory';
        const click = isDir
          ? `fmNavigate('${serverId}','${(path.endsWith('/')?path:path+'/').replace(/\/\//g,'/')}${f.name}')`
          : `fmOpenFile('${serverId}','${(path.endsWith('/')?path:path+'/').replace(/\/\//g,'/')}${f.name}')`;
        return `<tr>
          <td onclick="${click}"><span class="fm-icon">${icon}</span><span class="fm-name ${isDir?'dir':''}">${esc(f.name)}</span></td>
          <td class="fm-size">${isDir?'–':fmtBytes(f.size)}</td>
          <td class="fm-date">${f.modified||'–'}</td>
          <td><div class="fm-actions">
            ${!isDir?`<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();fmOpenFile('${serverId}','${(path.endsWith('/')?path:path+'/').replace(/\/\//g,'/')}${f.name}')">✏️</button>`:''}
            <button class="btn btn-ghost btn-xs text-danger" onclick="event.stopPropagation();fmDelete('${serverId}','${(path.endsWith('/')?path:path+'/').replace(/\/\//g,'/')}${f.name}','${f.type}')">🗑</button>
          </div></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function fmNavigate(serverId, newPath) {
  State.fmPath = newPath.replace(/\/\//g, '/');
  const pathEl = document.getElementById('fm-path'); if (pathEl) pathEl.textContent = State.fmPath;
  fmLoad(serverId, State.fmPath);
}

function fmNavigateUp() {
  if (!State.serverDetail) return;
  // Root für diesen Server ermitteln
  const srvRoot = ((State.server?.image||'').includes('itzg') || (State.server?.image||'').includes('minecraft-server'))
    ? '/data' : '/home/container';
  // Nicht über das Server-Root hinaus navigieren
  if (State.fmPath === srvRoot || State.fmPath === '/') return;
  const parts = State.fmPath.split('/').filter(Boolean);
  parts.pop();
  const newPath = '/' + parts.join('/');
  State.fmPath = newPath.length <= srvRoot.length ? srvRoot : newPath;
  fmLoad(State.serverDetail, State.fmPath);
}

function fmRefresh() { if (State.serverDetail) fmLoad(State.serverDetail, State.fmPath); }

async function fmOpenFile(serverId, filePath) {

    showModal(`
      <div class="modal-title">
        <span>✏️ ${esc(filePath.split('/').pop())}</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label text-mono" style="color:var(--text3)">${esc(filePath)}</label>
        <textarea id="fm-edit-content" class="form-input" style="height:360px;font-family:var(--mono);font-size:12px;line-height:1.6">${esc(data.content)}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-primary" onclick="fmSaveFile('${serverId}','${filePath}')">💾 Speichern</button>
      </div>`, true);
  } catch (e) { toast('Fehler: '+e.message,'error'); }
}

async function fmSaveFile(serverId, filePath) {
  const content = document.getElementById('fm-edit-content')?.value;
  if (content === undefined) return;
  try {

async function onEggSelect(eggId) {

    const cmdEl = document.getElementById('m-cmd');
    const envEl = document.getElementById('m-env');
    const mcOpts = document.getElementById('m-minecraft-opts');
    if (imgEl && egg.docker_image) imgEl.value = egg.docker_image;
    if (cmdEl && egg.startup_command) cmdEl.value = egg.startup_command;
    if (envEl && egg.env_vars?.length) {
      envEl.value = egg.env_vars.map(v => `${v.key}=${v.default||''}`).join('\n');
    }
    // Minecraft-Optionen ein-/ausblenden
    const isMinecraft = egg.category === 'minecraft' || egg.docker_image.includes('minecraft');
    if (mcOpts) mcOpts.classList.toggle('hidden', !isMinecraft);
    toast(`Template "${egg.name}" geladen`, 'info');
  } catch {}
}

async function submitCreateServer() {
  const name = document.getElementById('m-name').value.trim();
  const image = document.getElementById('m-image').value.trim();
  const node_id = document.getElementById('m-node')?.value;
  if (!name || !image) { mErr('Name und Image sind erforderlich'); return; }

  const portsRaw = document.getElementById('m-ports').value.trim();
  const ports = portsRaw ? portsRaw.split(',').map(p => {
    const [h,c] = p.trim().split(':');
    return c ? { host: parseInt(h), container: parseInt(c) } : { host: parseInt(h), container: parseInt(h) };
  }) : [];
  const envRaw = document.getElementById('m-env').value.trim();
  const env_vars = {};
  if (envRaw) envRaw.split('\n').forEach(line => { const [k,...v]=line.split('='); if(k&&v.length) env_vars[k.trim()]=v.join('=').trim(); });
  // Minecraft VERSION + TYPE aus den Dropdowns einfügen (überschreiben ENV-Zeile falls vorhanden)
  const mcVersionEl = document.getElementById('m-mc-version');
  const mcTypeEl    = document.getElementById('m-mc-type');
  const mcOptsEl    = document.getElementById('m-minecraft-opts');
  if (mcVersionEl && mcOptsEl && !mcOptsEl.classList.contains('hidden')) {
    env_vars['VERSION'] = mcVersionEl.value;
    env_vars['TYPE']    = mcTypeEl?.value || 'PAPER';
    env_vars['EULA']    = 'TRUE';
  }

  const body = {
    name, image, node_id,
    description:     document.getElementById('m-desc').value.trim(),
    cpu_limit:       parseFloat(document.getElementById('m-cpu').value)||1,
    cpu_percent:     parseInt(document.getElementById('m-cpu-pct')?.value)||100,
    memory_limit:    parseInt(document.getElementById('m-mem').value)||512,
    disk_limit:      parseInt(document.getElementById('m-disk').value)||5120,
    startup_command: document.getElementById('m-cmd').value.trim(),
    ports, env_vars,
  };
  const uidEl = document.getElementById('m-userid');
  if (uidEl?.value.trim()) body.user_id = uidEl.value.trim();

  try {
    const srv = await API.post('/servers', body);
    toast('Server wird erstellt...', 'success');
    closeModal();
    navigate('server-detail', srv.id);
    loadServerCount();
  } catch (e) { mErr(e.message); }
}

async function loadAdminAllocations() {
  document.getElementById('page-actions').innerHTML = `<button class="btn btn-primary" onclick="showAddAllocation()">＋ Ports hinzufügen</button>`;
  const [allocs, nodes] = await Promise.all([
    API.get('/allocations').catch(() => []),
    API.get('/nodes').catch(() => []),
  ]);
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  const grouped = {};
  allocs.forEach(a => { if (!grouped[a.node_id]) grouped[a.node_id] = []; grouped[a.node_id].push(a); });

  document.getElementById('page-content').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:20px">
      ${Object.entries(grouped).map(([nid, ports]) => {
        const node = nodeMap[nid] || { name: nid };
        const free = ports.filter(p => !p.server_id).length;
        return `
          <div class="card">
            <div class="card-header">
              <div><div class="card-title">🌐 ${esc(node.name)}</div><div class="text-dim text-sm">${esc(node.fqdn||'')}</div></div>
              <div style="display:flex;gap:12px;align-items:center">
                <span class="text-dim text-sm">${free} frei / ${ports.length} gesamt</span>
                <button class="btn btn-ghost btn-xs" onclick="showAddAllocation('${nid}')">＋ Ports</button>
              </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              ${ports.slice(0,80).map(p => `
                <div style="position:relative;display:inline-block">
                  <span class="port-badge ${p.server_id?'used':'free'}" title="${p.server_id?'Belegt: '+esc(p.server_name||p.server_id):'Frei'}" onclick="!${!!p.server_id} && confirmDeleteAlloc('${p.id}',${p.port})">
                    ${p.port}${p.alias?` (${esc(p.alias)})`:''}
                  </span>
                </div>`).join('')}
              ${ports.length > 80 ? `<span class="text-dim text-sm" style="padding:4px 8px">... +${ports.length-80} weitere</span>` : ''}
            </div>
          </div>`;
      }).join('')}
      ${allocs.length === 0 ? '<div class="empty"><div class="empty-icon">🔌</div><h3>Keine Port-Allocations</h3><p>Füge Ports für deine Nodes hinzu</p></div>' : ''}
    </div>`;
}

    <div class="form-group"><label class="form-label">Node</label>
      <select id="alloc-node" class="form-input">

    <div class="grid grid-2">
      <div class="form-group"><label class="form-label">Start Port</label><input type="number" id="alloc-start" class="form-input" placeholder="25565"/></div>
      <div class="form-group"><label class="form-label">End Port (optional)</label><input type="number" id="alloc-end" class="form-input" placeholder="Leer = einzelner Port"/></div>
    </div>
    <div class="form-group"><label class="form-label">Alias (optional)</label><input type="text" id="alloc-alias" class="form-input" placeholder="minecraft-1"/></div>

      <button class="btn btn-primary" onclick="doAddAllocation()">Ports hinzufügen</button>

async function doAddAllocation() {
  try {
    const nodeId = document.getElementById('alloc-node').value;
    const ip     = document.getElementById('alloc-ip').value || '0.0.0.0';
    const start  = parseInt(document.getElementById('alloc-start').value);
    const end    = parseInt(document.getElementById('alloc-end').value) || start;
    const alias  = document.getElementById('alloc-alias').value;
    if (!nodeId || !start) return toast('Node und Start-Port erforderlich', 'error');
    if (start === end) {
      await API.post('/allocations', { node_id: nodeId, ip, port: start, alias });
    } else {
      await API.post('/allocations/bulk', { node_id: nodeId, ip, start_port: start, end_port: end });
    }
    toast('Ports hinzugefügt!', 'success'); closeModal(); loadAdminAllocations();
  } catch (e) { toast('Fehler: '+e.message,'error'); }
}

  if (!confirm(`Port ${port} wirklich entfernen?`)) return;
  try { await API.delete(`/allocations/${id}`); toast('Port entfernt','success'); loadAdminAllocations(); }
  catch (e) { toast(e.message,'error'); }
}

  const ac = {
    LOGIN:'#00d4ff',SERVER_CREATE:'#00f5a0',SERVER_DELETE:'#ff4757',SERVER_START:'#00f5a0',
    SERVER_STOP:'#f59e0b',SERVER_RESTART:'#f59e0b',SERVER_CLONE:'#a78bfa',
    USER_CREATE:'#a78bfa',PORT_ASSIGN:'#60a5fa',TASK_CREATE:'#34d399',
    FILE_WRITE:'#fbbf24',FILE_DELETE:'#ff4757',
  };
  document.getElementById('page-content').innerHTML = `
    <div class="card">
      <div style="margin-bottom:8px;font-size:12px;color:var(--text3)">${filtered.length} von ${_auditAll.length} Einträgen</div>
      <table class="table">
        <thead><tr><th>Zeit</th><th>Benutzer</th><th>Aktion</th><th>Details</th><th>IP</th></tr></thead>
        <tbody>${filtered.map(l => {
          let details = '';
          try { const d = JSON.parse(l.details||'{}'); details = Object.entries(d).map(([k,v])=>`<span class="text-dim">${k}:</span> ${esc(String(v)).substring(0,30)}`).join(' '); } catch {}
          return `<tr>
            <td class="text-mono text-sm text-dim" style="white-space:nowrap">${new Date(l.created_at).toLocaleString('de-DE')}</td>
            <td><span style="font-weight:500">${esc(l.username||'system')}</span></td>
            <td><span class="audit-badge" style="background:${ac[l.action]||'#64748b'}22;color:${ac[l.action]||'#94a3b8'};border-color:${ac[l.action]||'#334155'}">${l.action}</span></td>
            <td class="text-sm" style="max-width:260px;overflow:hidden">${details || (l.target_type ? `${l.target_type}:${(l.target_id||'').substring(0,8)}` : '—')}</td>
            <td class="text-mono text-sm text-dim">${l.ip||'-'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (!b || b===0) return '0 B';
  const k=1024, s=['B','KB','MB','GB','TB'], i=Math.floor(Math.log(b)/Math.log(k));
  return (b/k**i).toFixed(1)+' '+s[i];
}
function esc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}
function toast(msg, type='info') {
  const el = document.createElement('div');
  const icons = {success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'•'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='slideOut .25s forwards'; setTimeout(()=>el.remove(),250); }, 3500);
}
function showModal(html, large=false) {
  document.getElementById('modal-container').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal${large?' modal-lg':''}">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
function mErr(m) { const el=document.getElementById('m-error'); if(el){el.textContent=m;el.classList.remove('hidden');}else toast(m,'error'); }
// Helper für Text-Klassen inline
function text_danger(el) { el.style.color='var(--danger)'; }

const ModState = {
  platform: null,       // { game, loader, has_curseforge }
  activeTab: 'modrinth',// modrinth | curseforge | workshop | github | generic
  searchQuery: '',
  results: [],
  installed: [],
  loading: false,
};

const PLATFORM_ICONS = {
  minecraft: '⛏️', source: '🔫', valheim: '⚔️', generic: '📦',
};
const LOADER_LABELS = {
  paper:'Paper', spigot:'Spigot', fabric:'Fabric', forge:'Forge',
  quilt:'Quilt', neoforge:'NeoForge', bungeecord:'BungeeCord', velocity:'Velocity',
};

async function modsInit(serverId) {
  const root = document.getElementById('mods-root');
  if (!root) return;
  root.innerHTML = '<div class="empty"><div class="spin">🧩</div></div>';
  try {
    ModState.platform = await API.get(`/servers/${serverId}/mods/platform`);
  } catch (e) {
    root.innerHTML = `<div class="empty"><p class="text-danger">Fehler: ${esc(e.message)}</p></div>`;
    return;
  }
  if (!ModState.platform.container_ready) {
    root.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Container ist noch nicht bereit (wird installiert)</p></div>';
    return;
  }
  modsRender(serverId);
  modsLoadInstalled(serverId);
}

function modsRender(serverId) {
  const root = document.getElementById('mods-root');
  if (!root) return;
  const p = ModState.platform;
  const game = p?.game || 'generic';
  const loader = p?.loader || '';
  const pbClass = `pb-${game}`;
  const isMinecraft = game === 'minecraft';
  const isSource    = game === 'source';
  const isValheim   = game === 'valheim';

  // Determine which tabs to show
  const tabs = [];
  if (isMinecraft) { tabs.push({ id:'modrinth', label:'🟢 Modrinth' }); }
  if (isMinecraft && p?.has_curseforge) { tabs.push({ id:'curseforge', label:'🔶 CurseForge' }); }
  if (isSource || isValheim) { tabs.push({ id:'workshop', label:'🔵 Steam Workshop' }); }
  tabs.push({ id:'github',  label:'🐙 GitHub' });
  tabs.push({ id:'generic', label:'🔗 Direkte URL' });

  if (!tabs.find(t => t.id === ModState.activeTab)) ModState.activeTab = tabs[0]?.id || 'generic';

  root.innerHTML = `
    <div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span class="platform-badge ${pbClass}">
          ${PLATFORM_ICONS[game]||'📦'} ${game.charAt(0).toUpperCase()+game.slice(1)}
          ${loader ? ` · ${LOADER_LABELS[loader]||loader}` : ''}
        </span>
        ${!p?.has_curseforge && isMinecraft ? '<span class="text-dim text-xs">CurseForge: CURSEFORGE_API_KEY nicht gesetzt</span>' : ''}
      </div>

      <div class="mods-layout">
        <!-- LEFT: Search + Results -->
        <div>
          <div class="mod-tabs">
            ${tabs.map(t => `<button class="mod-tab ${ModState.activeTab===t.id?'active':''}" onclick="modsSwitchTab('${t.id}','${serverId}')">${t.label}</button>`).join('')}
          </div>
          <div id="mods-search-area">
            ${modsRenderSearchArea(serverId)}
          </div>
        </div>

        <!-- RIGHT: Installed Mods -->
        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">📦 Installierte Mods</div>
              <button class="btn btn-ghost btn-xs" onclick="modsLoadInstalled('${serverId}')">↺</button>
            </div>
            <div id="mods-installed-list"><div class="text-dim text-sm" style="padding:8px">Lädt...</div></div>
          </div>
        </div>
      </div>
    </div>`;
}

function modsRenderSearchArea(serverId) {
  const tab = ModState.activeTab;
  if (tab === 'modrinth' || tab === 'curseforge') {
    return `
      <div class="mod-search-bar">
        <input type="text" class="form-input" id="mod-search-input"
          placeholder="Mod/Plugin suchen..." value="${esc(ModState.searchQuery)}"
          onkeydown="if(event.key==='Enter') modsSearch('${serverId}')"/>
        <button class="btn btn-primary btn-sm" onclick="modsSearch('${serverId}')">Suchen</button>
      </div>
      <div id="mod-results">${ModState.results.length ? modsRenderResults(serverId) : '<div class="empty" style="padding:24px"><p class="text-dim">Suche starten...</p></div>'}</div>`;
  }
  if (tab === 'workshop') {
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-title" style="margin-bottom:12px">Steam Workshop installieren</div>
        <div class="form-group"><label class="form-label">Workshop Item ID</label>
          <input type="text" id="ws-id-input" class="form-input" placeholder="z.B. 2123456789"/>

        <div class="modal-footer" style="margin:0;padding:0;border:none;justify-content:flex-start;margin-top:8px">

        </div>
        <div id="mod-install-log" class="install-progress hidden"></div>
      </div>`;
  }
  if (tab === 'github') {
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-title" style="margin-bottom:12px">GitHub Release herunterladen</div>
        <div class="form-group"><label class="form-label">Repository (owner/repo)</label>
          <input type="text" id="gh-repo-input" class="form-input" placeholder="EssentialsX/Essentials"/>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="modsLoadGithubReleases('${serverId}')">📦 Releases laden</button>
        <div id="mod-results" style="margin-top:12px"></div>
      </div>`;
  }
  if (tab === 'generic') {
    return `
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">Direkte URL / beliebige Datei</div>
        <div class="form-group"><label class="form-label">Download-URL</label>
          <input type="text" id="generic-url-input" class="form-input" placeholder="https://example.com/myplugin-1.0.jar"/>
        </div>
        <div class="grid grid-2">
          <div class="form-group"><label class="form-label">Dateiname (optional)</label>
            <input type="text" id="generic-name-input" class="form-input" placeholder="myplugin.jar"/>
          </div>
          <div class="form-group"><label class="form-label">Zielordner im Container</label>
            <input type="text" id="generic-dest-input" class="form-input" placeholder="/home/container/plugins"/>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="modsInstallGeneric('${serverId}')">⬇ Herunterladen & installieren</button>
        <div id="mod-install-log" class="install-progress hidden"></div>
      </div>`;
  }
  return '';
}

function modsRenderResults(serverId) {
  if (!ModState.results.length)
    return '<div class="empty" style="padding:24px"><p class="text-dim">Keine Ergebnisse</p></div>';
  return ModState.results.map(m => {
    const srcCls = `msb-${m.source||'modrinth'}`;
    const dlFmt  = m.downloads > 1e6 ? (m.downloads/1e6).toFixed(1)+'M' : m.downloads > 1e3 ? (m.downloads/1e3).toFixed(0)+'K' : m.downloads;
    return `
      <div class="mod-card" onclick="modsShowVersions('${serverId}','${m.id}','${esc(m.title)}','${m.source||ModState.activeTab}')">
        ${m.icon
          ? `<img class="mod-icon" src="${esc(m.icon)}" onerror="this.style.display='none'" loading="lazy"/>`
          : `<div class="mod-icon-placeholder">🧩</div>`}
        <div class="mod-info">
          <div class="mod-name">${esc(m.title)}</div>
          <div class="mod-desc">${esc(m.description||'')}</div>
          <div class="mod-meta">
            ${dlFmt ? `<span class="mod-dl">⬇ ${dlFmt}</span>` : ''}
            <span class="mod-source-badge ${srcCls}">${m.source||ModState.activeTab}</span>
            ${(m.categories||[]).slice(0,2).map(c=>`<span class="vtag">${esc(c)}</span>`).join('')}
            ${m.author ? `<span class="text-dim text-xs">by ${esc(m.author)}</span>` : ''}
          </div>
        </div>
        <button class="btn btn-ghost btn-xs" style="align-self:center;flex-shrink:0">Versionen →</button>
      </div>`;
  }).join('');
}

function modsSwitchTab(tab, serverId) {
  ModState.activeTab  = tab;
  ModState.results    = [];
  ModState.searchQuery = '';
  const area = document.getElementById('mods-search-area');
  if (area) area.innerHTML = modsRenderSearchArea(serverId);
  // also update tab buttons
  document.querySelectorAll('.mod-tab').forEach(b => b.classList.toggle('active', b.textContent.includes(
    {modrinth:'Modrinth', curseforge:'CurseForge', workshop:'Workshop', github:'GitHub', generic:'URL'}[tab]||tab
  )));
}

async function modsSearch(serverId) {
  const input = document.getElementById('mod-search-input');
  const q = input?.value.trim() || '';
  ModState.searchQuery = q;
  const tab = ModState.activeTab;
  const resultsEl = document.getElementById('mod-results');
  if (resultsEl) resultsEl.innerHTML = '<div class="empty" style="padding:16px"><div class="spin">🧩</div></div>';
  try {
    let data;
    if (tab === 'modrinth') {
      data = await API.get(`/servers/${serverId}/mods/modrinth/search?q=${encodeURIComponent(q)}`);
      ModState.results = data.hits || [];
    } else if (tab === 'curseforge') {
      data = await API.get(`/servers/${serverId}/mods/curseforge/search?q=${encodeURIComponent(q)}`);
      ModState.results = data.hits || [];
    }
    if (resultsEl) resultsEl.innerHTML = modsRenderResults(serverId);
  } catch (e) {
    if (resultsEl) resultsEl.innerHTML = `<div class="empty" style="padding:16px"><p class="text-danger">Fehler: ${esc(e.message)}</p></div>`;
  }
}

async function modsShowVersions(serverId, projectId, name, source) {
  showModal(`
    <div class="modal-title"><span>📦 ${esc(name)}</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="text-dim text-sm" style="margin-bottom:12px">Versionen laden...</div>
    <div id="version-list-content"><div class="empty"><div class="spin">⏳</div></div></div>
  `, true);

  try {
    let versions = [];
    if (source === 'modrinth') {
      versions = await API.get(`/servers/${serverId}/mods/modrinth/project/${projectId}/versions`);
    } else if (source === 'curseforge') {
      versions = await API.get(`/servers/${serverId}/mods/curseforge/mod/${projectId}/files`);
    }
    const el = document.getElementById('version-list-content');
    if (!el) return;
    if (!versions.length) { el.innerHTML = '<div class="empty"><p>Keine Versionen gefunden</p></div>'; return; }
    el.innerHTML = `<div class="version-list">` + versions.map(v => {
      const files = v.files || [];
      const primaryFile = files.find(f=>f.primary) || files[0] || { url: v.url, filename: v.filename||v.name };
      const mcVers = (v.game_versions||[]).slice(0,3).map(gv=>`<span class="vtag mc">${esc(gv)}</span>`).join('');
      const loaders = (v.loaders||[]).map(l=>`<span class="vtag loader">${esc(l)}</span>`).join('');
      return `
        <div class="version-row" onclick="modsInstallFile('${serverId}','${esc(primaryFile.url||'')}','${esc(primaryFile.filename||primaryFile.name||'')}','${source}','${esc(name)}')">
          <div class="version-name">${esc(v.name||v.version||v.tag||'Unbekannt')}</div>
          <div class="version-tags">${mcVers}${loaders}</div>
          <span class="btn btn-ghost btn-xs">⬇ Installieren</span>
        </div>`;
    }).join('') + '</div>';
  } catch (e) {
    const el = document.getElementById('version-list-content');
    if (el) el.innerHTML = `<div class="empty"><p class="text-danger">${esc(e.message)}</p></div>`;
  }
}

async function modsInstallFile(serverId, url, filename, source, modName) {
  if (!url) { toast('Keine Download-URL verfügbar', 'error'); return; }
  closeModal();
  toast(`⬇ ${modName} wird installiert...`, 'info');
  try {

// ─── NETZWERK / PORTS ────────────────────────────────────────────────────────
async function networkInit(serverId) {
  const root = document.getElementById('network-root');
  if (!root) return;
  root.innerHTML = '<div class="empty"><div class="spin">🌐</div></div>';
  try {
    const [ports, allocs] = await Promise.all([
      API.get(`/servers/${serverId}/ports`),
      API.get(`/allocations`).catch(() => [])
    ]);
    const srv = State.server || {};
    const nodeId = srv.node_id;

    // Fallback: wenn keine Allocations vorhanden, Server-Ports aus JSON anzeigen
    let effectivePorts = ports;
    if (ports.length === 0 && Array.isArray(srv.ports) && srv.ports.length > 0) {
      // Ports aus server.ports synthetisch anzeigen (noch nicht in port_allocations)
      effectivePorts = srv.ports.map((p, i) => ({
        id: null,
        ip: '0.0.0.0',
        port: p.host || p,
        is_primary: i === 0 ? 1 : 0,
        notes: '',
        _synthetic: true,
      }));
    }

    // Free allocations for this node (not yet assigned)
    const freeAllocs = allocs.filter(a => !a.server_id && a.node_id === nodeId);

    root.innerHTML = networkRender(effectivePorts, freeAllocs, serverId);
  } catch(e) {
    root.innerHTML = `<div class="empty"><p>Fehler: ${esc(e.message)}</p></div>`;
  }
}

function networkRender(ports, freeAllocs, serverId) {
  const primaryPort = ports.find(p => p.is_primary);
  const secondaryPorts = ports.filter(p => !p.is_primary);

  const portRows = ports.map(p => `
    <div class="network-port-row ${p.is_primary ? 'is-primary' : ''}">
      <div class="network-port-left">
        <span class="network-icon">🖧</span>
        <div>
          <div class="network-badges">
            <span class="badge-ip">${esc(p.ip === '0.0.0.0' ? (State.server?.node_fqdn || p.ip) : p.ip)}</span>
            <span class="badge-port">${p.port}</span>
          </div>
          <div class="network-labels"><span>IP ADDRESS</span><span>PORT</span></div>
        </div>
      </div>
      <div class="network-notes">
        <input type="text" class="form-input network-notes-input" value="${esc(p.notes||'')}"
          placeholder="Notizen..."
          onblur="networkSaveNotes('${serverId}','${p.id}',this.value)"/>
      </div>
      <div class="network-actions">
        ${p._synthetic
          ? '<span class="text-dim text-sm">Wird beim Neustart registriert</span>'
          : p.is_primary
            ? '<span class="btn btn-primary btn-sm" style="cursor:default">Primary</span>'
            : `<button class="btn btn-danger btn-sm" onclick="networkRemovePort('${serverId}','${p.id}')" title="Port entfernen">🗑</button>
               <button class="btn btn-secondary btn-sm" onclick="networkSetPrimary('${serverId}','${p.id}')">Make Primary</button>`
        }
      </div>
    </div>`).join('');

  const freeSection = freeAllocs.length ? `
    <div class="card" style="margin-top:16px">
      <div class="card-title" style="margin-bottom:12px">➕ Port hinzufügen</div>
      <div class="network-add-ports">
        ${freeAllocs.map(a => `
          <button class="badge-alloc" onclick="networkAddPort('${serverId}','${a.id}')">
            ${esc(a.ip === '0.0.0.0' ? (State.server?.node_fqdn || a.ip) : a.ip)}:<strong>${a.port}</strong>
          </button>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="card">
      <div class="card-title" style="margin-bottom:16px">🌐 Port-Zuweisung</div>
      ${ports.length ? portRows : '<div class="empty" style="padding:20px"><p>Noch keine Ports zugewiesen</p></div>'}
    </div>
    ${freeSection}`;
}

async function networkSetPrimary(serverId, allocId) {
  try {
    await API.put(`/servers/${serverId}/ports/${allocId}/primary`, {});

  } catch(e) { toast(e.message, 'error'); }

          ? '<div class="empty" style="padding:24px"><p>Noch keine Tasks erstellt</p></div>'
          : `<table class="table">
              <thead><tr><th>Name</th><th>Aktion</th><th>Cron</th><th>Zuletzt</th><th>Status</th><th></th></tr></thead>

                <td class="text-sm text-dim">${t.last_run ? new Date(t.last_run).toLocaleString('de-DE') : '—'}</td>
                <td>${t.enabled ? '<span style="color:var(--success)">●</span>' : '<span style="color:var(--text3)">●</span>'}</td>
                <td style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-xs" onclick="taskRun('${serverId}','${t.id}')" title="Jetzt ausführen">▶</button>

                  <button class="btn btn-ghost btn-xs text-danger" onclick="taskDelete('${serverId}','${t.id}')">🗑</button>
                </td>
              </tr>`).join('')}</tbody>
            </table>`}
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-title" style="margin-bottom:8px">📖 Cron-Format</div>
        <div class="text-mono text-sm" style="color:var(--text2);line-height:2">
          ┌─── Minute (0–59)<br>
          │ ┌─── Stunde (0–23)<br>
          │ │ ┌─── Tag (1–31)<br>
          │ │ │ ┌─── Monat (1–12)<br>
          │ │ │ │ ┌─── Wochentag (0–7, 0/7=So)<br>
          │ │ │ │ │<br>
          <span style="color:var(--accent)">* * * * *</span>
        </div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px">
          ${[['0 6 * * *','tägl. 06:00'],['0 */6 * * *','alle 6h'],['0 0 * * 0','Sonntag 00:00'],['*/30 * * * *','alle 30min'],['0 4 * * 1-5','Mo–Fr 04:00']].map(([c,l])=>`<button class="badge-alloc text-sm" onclick="document.getElementById('m-cron')&&(document.getElementById('m-cron').value='${c}')">${esc(l)}<span class="text-mono text-dim" style="margin-left:6px">${c}</span></button>`).join('')}
        </div>
      </div>`;
  } catch(e) {
    root.innerHTML = `<div class="empty"><p>Fehler: ${esc(e.message)}</p></div>`;
  }
}

function cronHuman(expr) {
  const presets = {
    '0 * * * *': 'Stündlich','0 0 * * *': 'Täglich 00:00','0 6 * * *': 'Täglich 06:00',
    '0 */6 * * *': 'Alle 6 Stunden','0 0 * * 0': 'Wöchentlich (So)','*/5 * * * *': 'Alle 5 min',
    '*/30 * * * *': 'Alle 30 min',
  };
  return presets[expr] || '';
}

const PERM_LABELS = { console:'Konsole', files:'Dateien', startup:'Startup', allocations:'Ports', schedule:'Tasks', backups:'Backups' };

          <div>
            <div class="card-title">👥 Zugriffsverwaltung</div>

          </div>

        </div>

          ${permsInfo.map(p => `
            <div style="background:var(--bg3);border-radius:8px;padding:10px 12px">
